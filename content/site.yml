home_faq:
- question: 跑路云提供的机场优惠码一定有效吗？
  answer: 不一定。优惠码可能受有效期、用户类型、套餐和支付方式限制，本站会标注核验日期，最终以服务商官网结算页实际减免结果为准。
- question: 找不到优惠码输入框怎么办？
  answer: 部分服务商采用自动折扣，或仅在指定套餐和活动页面展示优惠。请优先查看官网公告和结算页面，不要在非官方页面输入账号信息。
- question: 为什么优惠码显示无效？
  answer: 常见原因包括活动结束、仅限新用户、套餐不适用、已达到使用次数上限、输入包含空格或账号不符合活动规则。
- question: 跑路云会发布无法验证的优惠码吗？
  answer: 不会把无法公开验证的代码标记为有效。如果只能确认存在活动但无法确认代码，文章会明确说明暂未确认到固定优惠码。
