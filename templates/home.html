<section class="hero-section">
  <div class="container hero-layout">
    <div class="hero-visual">
      <img src="$hero_image" alt="跑路云驿站" class="hero-illustration">
    </div>
    <div class="hero-content">
      <h1 class="hero-title">$brand</h1>
      <p class="hero-tagline">$tagline</p>
      <p class="hero-description">$description</p>
      <div class="hero-actions">
        <a href="$articles_url" class="btn btn-primary">查看最新优惠</a>
        <ul class="trust-badge">$trust_points</ul>
      </div>
    </div>
  </div>
</section>
<div id="popupOverlay" class="popup-overlay" aria-label="推荐广告">
    <div class="popup-content">
      <div class="popup-stack">
        <a href="https://xn--9kqs58iq4c.com/" target="_blank" rel="sponsored noopener" class="popup-link">
          <p class="popup-title">Clash 机场推荐</p>
          <img src="https://free.picui.cn/free/2026/06/05/6a229370bf0c1.png" alt="机场地址" class="popup-image">
        </a>
        <div class="popup-shop-wrap">
          <a href="https://xn--9kqs58iq4c.com/" target="_blank" rel="sponsored noopener" class="popup-shop-btn">
            加速器下载
          </a>
        </div>
      </div>
      <button class="1" id="2" type="button" aria-label="关闭">&times;</button>
    </div>
  </div>

  <script src="/assets/js/main.js?v=20260612103910"></script>
<section class="latest-offers section">
  <div class="container">
    <div class="section-divider"></div>
    <h2 class="section-title">最新优惠</h2>
    <div class="offer-carousel">
      $article_cards
    </div>
  </div>
</section>

<section class="popular-topics section">
  <div class="container">
    <div class="section-divider"></div>
    <h2 class="section-title">热门机场</h2>
    <div class="topic-grid">
      $topic_cards
    </div>
  </div>
</section>

<section class="verification section">
  <div class="container">
    <div class="section-divider"></div>
    <h2 class="section-title">活动核验</h2>
    <div class="verification-summary">
      <p>$answer_summary</p>
      <p class="verification-meta">已整理 $article_count 项优惠 · 最后更新 $last_updated</p>
    </div>
    <div class="faq-list">
      $home_faq_html
    </div>
  </div>
</section>

<section class="notice-bar section">
  <div class="container">
    <p class="notice-text">$notice</p>
  </div>
</section>

<aside class="friend-links section">
  <div class="container">
    <h2 class="section-title">友情链接</h2>
    <div class="friend-grid">
      $friend_cards
    </div>
  </div>
</aside>
