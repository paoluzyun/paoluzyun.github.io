<article class="article-detail">
  <div class="container article-container">
    <div class="article-header">
      <figure class="article-banner">
        <img src="$article_image" alt="$article_image_alt" class="article-image">
        <figcaption class="article-image-caption">$article_image_caption</figcaption>
      </figure>
      <div class="article-meta">
        <span class="article-category">$category</span>
        <span class="article-date">$date</span>
        <span class="article-author">$author</span>
      </div>
      <h1 class="article-title">$article_title</h1>
      <p class="article-description">$article_description</p>
    </div>
    <div class="article-body">
      $article_body
    </div>
    <div class="article-footer">
      <div class="tag-list">$tag_html</div>
      <p class="article-description verification-note">$notice</p>
      <div class="verification-stamp">信息更新于 $date</div>
    </div>
  </div>
</article>

  <div class="container">
